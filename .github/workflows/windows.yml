name: Windows build

on:
  push:
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  REPO_DIR: ${{ github.workspace }}
  BUILD_DIR: ${{ github.workspace }}/bin/builddir
  BOOST_VERSION: "1.78.0"
  BOOST_INSTALL_DIR: "${{ github.workspace }}/bin/boost"

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Sync submodules hard
        shell: pwsh
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive --force

      - name: Show submodule status
        shell: pwsh
        run: |
          git rev-parse HEAD
          git submodule status --recursive

      - name: Create Build Environment
        shell: pwsh
        run: |
          cmake -E make_directory "${{ env.BUILD_DIR }}"

      - name: Install boost
        uses: MarkusJx/install-boost@v2
        id: install-boost
        with:
          boost_version: ${{ env.BOOST_VERSION }}
          toolset: msvc
          platform_version: 2022
          boost_install_dir: ${{ env.BOOST_INSTALL_DIR }}

      - name: Export BOOST_ROOT
        shell: pwsh
        run: |
          "BOOST_ROOT=${{ steps.install-boost.outputs.BOOST_ROOT }}" >> $env:GITHUB_ENV

      - name: Configure
        shell: pwsh
        run: |
          cmake -S "${{ env.REPO_DIR }}" -B "${{ env.BUILD_DIR }}" `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DBUILD_GAME_SERVER=ON `
            -DBUILD_LOGIN_SERVER=ON `
            -DBUILD_EXTRACTORS=OFF `
            -DBUILD_TOOLS=OFF `
            -DBUILD_PLAYERBOTS=OFF `
            -DBUILD_IKE3_BOTS=ON `
            -DBUILD_SCRIPTDEV=ON `
            -DBOOST_ROOT="${{ env.BOOST_ROOT }}"

      - name: Build
        shell: pwsh
        run: |
          cmake --build "${{ env.BUILD_DIR }}" --config ${{ env.BUILD_TYPE }}

      - name: List build output
        if: always()
        shell: pwsh
        run: |
          if (Test-Path "${{ github.workspace }}/bin") {
            Get-ChildItem "${{ github.workspace }}/bin" -Recurse | Select-Object FullName
          }

      - name: Archive files
        if: success()
        shell: pwsh
        run: |
          cd "${{ github.workspace }}/bin"
          if (Test-Path "x64_Release") {
            7z a -tzip snapshot.zip x64_Release
          } else {
            Write-Host "x64_Release folder not found"
            exit 1
          }

      - name: Archive this artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot
          path: bin/snapshot.zip

  notify:
    name: Discord Notification
    runs-on: ubuntu-latest
    needs: build
    if: failure()

    steps:
      - name: Notify
        uses: rjstone/discord-webhook-notify@v1.0.4
        with:
          severity: error
          description: Windows build failed
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}
          avatarUrl: https://github.githubassets.com/images/modules/logos_page/Octocat.png
